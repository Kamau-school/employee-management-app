<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contact | EMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">EMS Pro</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="new-contact.html">New Contact</a></li>
            <li><a href="view-contacts.html">View All Contacts</a></li>
        </ul>
    </nav>

    <section class="container">
        <h2>Add New Employee</h2>
        <form id="employeeForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@company.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+123 456 789">
            </div>
            <div class="form-group">
                <label>Department</label>
                <select>
                    <option>IT</option>
                    <option>HR</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                </select>
            </div>
            <div class="form-group">
                <label>Position</label>
                <input type="text" placeholder="Software Engineer">
            </div>
            <button type="submit" class="btn-submit">Register Employee</button>
        </form>
    </section>
</body>
</html>
